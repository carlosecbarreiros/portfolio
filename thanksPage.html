<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagem enviada — Carlos Barreiros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #07091a;
      --accent: #6366f1;
      --accent2:#8b5cf6;
      --text:   #f1f5f9;
      --muted:  #94a3b8;
      --dim:    #64748b;
      --grad:   linear-gradient(135deg, #6366f1, #8b5cf6);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    .bg-glow--1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,.12) 0%, transparent 70%);
      top: -150px; right: -100px;
    }
    .bg-glow--2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,.08) 0%, transparent 70%);
      bottom: -100px; left: -80px;
    }
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 56px 48px;
      text-align: center;
      max-width: 460px;
      width: calc(100% - 48px);
      animation: fade-up 0.6s ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .icon {
      width: 72px; height: 72px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 2rem;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: var(--grad);
      color: #fff;
      border-radius: 100px;
      font-weight: 600;
      font-size: 0.92rem;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
      transition: all 0.3s ease;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.45); }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <div class="card">
    <div class="icon">✉️</div>
    <h1>Mensagem enviada!</h1>
    <p>Obrigado pelo contato. Responderei assim que possível — geralmente em até 24 horas.</p>
    <a href="index.html">← Voltar ao portfólio</a>
  </div>
</body>
</html>
